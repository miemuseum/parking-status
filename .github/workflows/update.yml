name: Update Parking Status

on:
  schedule:
    - cron: "0 16,3,6,9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node scripts/scrape.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/today.json
          git diff --quiet --cached || git commit -m "Update parking status"
          git push
